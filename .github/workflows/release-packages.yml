name: Release Skill Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version or tag name, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: python -m pip install --upgrade pip pyyaml

      - name: Run skill validation
        run: python tooling/run-skill-validation.py

      - name: Build install packages
        run: python tooling/build-skill-packages.py --clean --version "${{ steps.meta.outputs.version }}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-skill-packages-${{ steps.meta.outputs.version }}
          path: dist/
          if-no-files-found: error

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          files: |
            dist/package-manifest-*.json
            dist/packages/**/*.zip
          generate_release_notes: true
