      acceptance:
        - output_is_concise: true
        - includes_total: true
        - follows_chinese_locale: true
  readme-generator:
    - name: simplify_readme
      platform: claude-code
      scenario_file: readme-generator/claude-code-simplify-readme.md
      input: "这份 README 太长了，请帮我改成极简版，只保留项目简介、核心特性和最短上手方式。"
      validator:
        type: skill-contract
        required_snippets:
          - "evidence-first"
          - "greenfield"
          - "refactor"
          - "simplification request"
      acceptance:
        - preserves_repo_facts: true
