version: 1
platforms:
  - claude-code
  - codex
skills:
  word-counter:
    - name: mixed_text_count
      platform: claude-code
      scenario_file: word-counter/claude-code-mixed-text.md
      input: "统计这段中英混排文本的字数：你好 OpenAI 2026"
      validator:
        type: script-output
        command:
          - python3
          - skills/word-counter/scripts/word_counter.py
          - --profile
          - mixed
          - --locale
          - zh
          - --format
          - markdown
          - --text
          - 你好 OpenAI 2026
        expected:
          contains:
            - "# 字数统计结果"
            - "- 统计方式：`mixed`（中英混排总数）"
            - "- 总数：`4`"
            - "| 中文字数 | 12 |"
      acceptance:
        - output_is_concise: true
        - includes_total: true
        - follows_chinese_locale: true
    - name: mixed_text_count
      platform: codex
      scenario_file: word-counter/codex-mixed-text.md
      input: "统计这段中英混排文本的字数：你好 OpenAI 2026"
      validator:
        type: script-output
        command:
          - python3
          - skills/word-counter/scripts/word_counter.py
          - --profile
          - mixed
          - --locale
          - zh
          - --format
          - markdown
          - --text
          - 你好 OpenAI 2026
        expected:
          contains:
            - "# 字数统计结果"
            - "- 统计方式：`mixed`（中英混排总数）"
            - "- 总数：`4`"
            - "| 中文字数 | 12 |"
      acceptance:
        - output_is_concise: true
        - includes_total: true
        - follows_chinese_locale: true
  readme-generator:
    - name: simplify_readme
      platform: claude-code
      scenario_file: readme-generator/claude-code-simplify-readme.md
      input: "这份 README 太长了，请帮我改成极简版，只保留项目简介、核心特性和最短上手方式。"
      validator:
        type: skill-contract
        required_snippets:
          - "evidence-first"
          - "greenfield"
          - "refactor"
          - "simplification request"
      acceptance:
        - preserves_repo_facts: true
        - reduces_noise: true
        - keeps_minimal_structure: true
    - name: simplify_readme
      platform: codex
      scenario_file: readme-generator/codex-simplify-readme.md
      input: "这份 README 太长了，请帮我改成极简版，只保留项目简介、核心特性和最短上手方式。"
      validator:
        type: skill-contract
        required_snippets:
          - "evidence-first"
          - "greenfield"
          - "refactor"
          - "simplification request"
      acceptance:
        - preserves_repo_facts: true
        - reduces_noise: true
        - keeps_minimal_structure: true
  android-interview:
    - name: mvp_session
      platform: claude-code
      scenario_file: android-interview/claude-code-mvp-session.md
      input: "Run an immersive-English Android interview session with TTS enabled."
      validator:
        type: command-artifacts
        command:
          - python3
          - skills/android-interview/scripts/run_mvp_demo.py
          - --output-dir
          - dist/interview-reports/validation-claude-code
          - --session-id
          - validation-claude-code
          - --enable-tts
        expected_contains:
          - "session_id=validation-claude-code"
          - "decision=pass"
          - "tts_status=generated"
        expected_files:
          - dist/interview-reports/validation-claude-code/session.json
          - dist/interview-reports/validation-claude-code/screening-summary.json
          - dist/interview-reports/validation-claude-code/screening-summary.md
          - dist/interview-reports/validation-claude-code/resume-prep.json
          - dist/interview-reports/validation-claude-code/resume-prep.md
          - dist/interview-reports/validation-claude-code/question-bank-validation.json
          - dist/interview-reports/validation-claude-code/question-bank-validation.md
          - dist/interview-reports/validation-claude-code/score.json
          - dist/interview-reports/validation-claude-code/interview-plan.json
          - dist/interview-reports/validation-claude-code/transcript.md
          - dist/interview-reports/validation-claude-code/report.html
          - dist/interview-reports/validation-claude-code/pass-summary.md
          - dist/interview-reports/validation-claude-code/tts/opening.mp3
          - dist/interview-reports/validation-claude-code/tts/questions.mp3
          - dist/interview-reports/validation-claude-code/tts/summary.mp3
        expected_file_contains:
          dist/interview-reports/validation-claude-code/score.json:
            - '"question_count": 9'
            - '"round3-biz-001"'
            - '"generated-round2-tradeoff-reasoning-002"'
            - '"question_bank_alignment"'
          dist/interview-reports/validation-claude-code/session.json:
            - '"screening_summary"'
            - '"consistency_summary"'
            - '"question_bank_validation"'
            - '"resume_prep"'
          dist/interview-reports/validation-claude-code/report.html:
