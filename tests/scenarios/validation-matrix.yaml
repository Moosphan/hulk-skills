            - '简历准备简报'
            - '题库校验'
            - '追问链路'
            - '一致性检查'
            - '题库对齐度'
      acceptance:
        - writes_local_artifacts: true
        - generates_tts_audio: true
        - keeps_evidence_based_scoring: true
